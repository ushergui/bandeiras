<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das Nações</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="countries.js"></script>
    <script src="curiosities.js"></script>
</head>
<body>

    <div class="main-container" id="main-container">
        
        <div id="profile-menu" class="screen">
            <h1>Quem vai jogar? 🕵️‍♂️</h1>
            <div id="profiles-list" class="profiles-grid"></div>
            
            <div class="new-profile-container">
                <input type="text" id="new-profile-name" placeholder="Novo Nome" maxlength="10">
                <button id="create-profile-btn">Criar</button>
            </div>
        </div>

        <div id="main-menu" class="screen hidden">
            <div class="header-info">
                <h2 id="welcome-message">Olá!</h2>
                <button id="change-profile-btn" class="secondary-button">Sair</button>
            </div>

            <h1>Detetive Global 🌍</h1>
            
            <div class="menu-grid">
                <button class="mode-button" data-gamemode="BandeiraPorPais">
                    🏳️ Qual a Bandeira?
                </button>
                <button class="mode-button" data-gamemode="PaisPorCapital">
                    🏛️ Qual o País?
                </button>
                <button class="mode-button" data-gamemode="ContinentePorPais">
                    🌎 Qual o Continente?
                </button>
                <button class="mode-button special-mode" data-gamemode="Memoria">
                    🃏 Jogo da Memória
                </button>
            </div>

            <div class="menu-footer">
                <button id="show-passport-button" class="ranking-button">🛂 Passaporte</button>
                <button id="show-ranking-button" class="ranking-button">🏆 Ranking</button>
                
            </div>
        </div>

        <div id="game-type-menu" class="screen hidden">
            <h1>Como você quer jogar?</h1>
            <div class="menu-grid">
                <button class="mode-button special-mode" data-gametype="Jornada">
                    🚀 Jornada <br><span style="font-size:0.8em; font-weight:normal">(Níveis progressivos)</span>
                </button>
                <button class="mode-button" data-gametype="Rápido">
                    ⚡ Rápido <br><span style="font-size:0.8em; font-weight:normal">(Treino livre)</span>
                </button>
            </div>
            <button class="back-button" data-target="main-menu">Voltar</button>
        </div>

        <div id="level-select-menu" class="screen hidden">
            <h1>Dificuldade</h1>
            <div class="menu-grid" id="level-buttons-container">
                <button class="mode-button" id="btn-level-1" data-level="1">Nível 1 <br><small>(Muito Fácil)</small></button>
                <button class="mode-button" id="btn-level-2" data-level="2">Nível 2 <br><small>(Fácil)</small></button>
                <button class="mode-button" id="btn-level-3" data-level="3">Nível 3 <br><small>(Médio)</small></button>
                <button class="mode-button" id="btn-level-4" data-level="4">Nível 4 <br><small>(Difícil)</small></button>
                <button class="mode-button" id="btn-level-5" data-level="5">Nível 5 <br><small>(Expert)</small></button>
            </div>
            <button class="back-button" id="level-back-btn" data-target="game-type-menu">Voltar</button>
        </div>

        <div id="lives-select-menu" class="screen hidden">
            <h1>Chances</h1>
            <div class="menu-grid">
                <button class="mode-button" data-lives="infinite">♾️ Infinitas</button>
                <button class="mode-button" data-lives="5">❤️ 5 Chances</button>
                <button class="mode-button" data-lives="10">❤️❤️ 10 Chances</button>
            </div>
            <button class="back-button" data-target="level-select">Voltar</button>
        </div>

        <div id="passport-menu" class="screen hidden">
            <h1>Passaporte 🛂</h1>
            <p>Descobertos: <span id="passport-count">0</span> | <span style="color:gold">Ouro: <span id="passport-gold">0</span></span></p>
            <div id="passport-grid" class="passport-grid"></div>
            <button class="back-button" data-target="main-menu">Voltar</button>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="stats-bar">
                <span id="stat-1">Pts: 0</span>
                <span id="stat-2">🔥 0</span>
                <span id="stat-3">❤️ 5</span>
            </div>
            
            <div class="progress-bar-container">
                <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%"></div>
            </div>

            <h2 id="instruction">...</h2>

            <div id="game-content-area">
                <div id="options-container" class="options-container hidden"></div>

                <div id="memory-game-container" class="hidden">
                    <div id="memory-grid" class="memory-grid"></div>
                </div>
            </div>

            <div id="feedback" class="feedback"></div>

            <div class="game-controls">
                <button id="back-to-menu-button">Sair</button>
                <button id="play-again-button" class="hidden">Jogar Novamente</button>
                <button id="facts-button" class="hidden" style="background-color: #4682B4;">Saber Mais ✨</button>
                <button id="next-button" class="hidden">Próxima</button>
            </div>
        </div>

    </div>

    <div id="level-up-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <h2>LEVEL UP! 🚀</h2>
            <p>Você avançou!</p>
            <button id="level-up-continue-button">Continuar</button>
        </div>
    </div>

    <div id="achievement-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <h2>🏅 Conquista!</h2>
            <p id="achievement-text">...</p>
            <button id="close-achievement-button">Legal!</button>
        </div>
    </div>

    <div id="ranking-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <h2>Ranking 🏆</h2>
            <div id="ranking-list" style="text-align: left; margin: 15px 0;"></div>
            <button id="close-ranking-button">Fechar</button>
        </div>
    </div>

    <div id="facts-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <h2>Curiosidades</h2>
            <p id="facts-content" style="font-size: 1.1em; line-height: 1.5; text-align: left;"></p>
            <button id="close-facts-button">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
